# .github/workflows/fleet-doctor.yml
#
# Daily fleet doctor cron. Drives Pipeline Core's install doctor across every
# repo in config/repos.json, writes results to state/results.json, refreshes
# the tracker section in README.md, and commits any changes.
#
# Auth: needs FLEET_PAT (PAT Classic with `repo`, `admin:org` read scoped to
# the orgs we manage). Stored as a repo secret on this repo.

name: Fleet doctor

on:
  schedule:
    - cron: "0 9 * * *"  # daily 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write  # commits the updated state/ and README

concurrency:
  group: fleet-doctor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout pipeline-fleet
        uses: actions/checkout@v5

      - name: Checkout pipeline-core
        uses: actions/checkout@v5
        with:
          repository: leebaroneau/pipeline-core
          ref: v1
          path: .pipeline-core

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install pipeline-core deps
        working-directory: .pipeline-core
        run: npm ci

      - name: Run fleet doctor
        env:
          FLEET_PAT: ${{ secrets.FLEET_PAT }}
          PIPELINE_CORE_PATH: ${{ github.workspace }}/.pipeline-core
        run: node scripts/fleet-doctor.mjs

      - name: Update tracker section in README
        run: node scripts/update-tracker.mjs

      - name: Commit state + README updates
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No fleet changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/ README.md
          git commit -m "chore(fleet): daily doctor sweep $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
